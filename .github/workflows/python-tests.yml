name: python-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy matplotlib

      - name: Compile scripts
        run: |
          python -m py_compile scripts/*.py

      - name: Validate metrics schema
        run: |
          python scripts/check_results_schema.py results/metrics.csv

      - name: Reproduce checked-in artifacts
        run: |
          bash scripts/reproduce_checked_in_results.sh

      - name: Check referenced artifacts
        run: |
          python scripts/check_artifacts_exist.py

      - name: Check reported configs are frozen
        run: |
          python scripts/check_reported_configs_frozen.py

      - name: Run tests
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests
